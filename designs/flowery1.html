<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowery Charms — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --orange:  #f62809;
      --red:     #d42b2b;
      --yellow:  #000000;
      --white:   #ffffff;
      --cream:   #fff9f0;
      --dark:    #1a0a00;
      --amber:   #e8860a;
      --peach:   #ffd5a8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── BACKGROUND ───────────────────────────── */
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 60% at 0% 100%, #5c1500 0%, transparent 55%),
        radial-gradient(ellipse 60% 50% at 100% 0%,  #6b2000 0%, transparent 50%),
        radial-gradient(ellipse 80% 80% at 50% 50%,  #2a0d00 0%, transparent 70%),
        #120600;
    }

    /* warm glow pulse behind card */
    .glow {
      position: fixed;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244,107,30,0.22) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      animation: glowPulse 4s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
      50%       { transform: translate(-50%,-50%) scale(1.15); opacity: 0.7; }
    }

    /* ── FLOATING PETALS (canvas) ─────────────── */
    #c { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

    /* ── SIDE FLORAL PANELS ───────────────────── */
    .panel {
      position: fixed; top: 0; bottom: 0;
      z-index: 3; pointer-events: none;
      width: 220px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 0;
      gap: 0;
    }
    .panel.left  { left: 0; }
    .panel.right { right: 0; transform: scaleX(-1); }

    /* ── MAIN LAYOUT ──────────────────────────── */
    .page {
      position: relative; z-index: 10;
      display: flex;
      align-items: center;
      gap: 0;
    }

    /* ── CARD ─────────────────────────────────── */
    .card {
      width: 400px;
      background: rgba(255,249,240,0.07);
      backdrop-filter: blur(24px) saturate(1.6);
      border: 1px solid rgba(244,107,30,0.3);
      border-radius: 0;
      padding: 52px 48px 48px;
      position: relative;
      overflow: hidden;
      animation: slideUp 1s cubic-bezier(0.16,1,0.3,1) both;
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    }

    @keyframes slideUp {
      from { opacity:0; transform: translateY(40px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* corner cut accent lines */
    .card::before {
      content:'';
      position: absolute; top:0; left:0; right:0;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow));
    }
    .card::after {
      content:'';
      position: absolute; bottom:0; left:0; right:0;
      height: 3px;
      background: linear-gradient(90deg, var(--yellow), var(--orange), var(--red));
    }

    /* inner warm tint overlay */
    .card-inner-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(244,107,30,0.12) 0%, transparent 60%);
    }

    /* ── BRAND ────────────────────────────────── */
    .brand {
      text-align: center;
      margin-bottom: 38px;
      animation: slideUp 1s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }

    .logo-ring {
      display: inline-block;
      position: relative;
      width: 68px; height: 68px;
      margin-bottom: 14px;
    }

    .logo-ring svg {
      animation: spinSlow 16s linear infinite;
    }

    @keyframes spinSlow {
      to { transform: rotate(360deg); }
    }

    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--white);
      letter-spacing: 0.02em;
      line-height: 1.1;
    }

    .brand h1 span {
      color: var(--yellow);
      font-style: italic;
    }

    .brand p {
      margin-top: 7px;
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,213,168,0.6);
      font-weight: 300;
    }

    /* ── FORM ─────────────────────────────────── */
    .field {
      margin-bottom: 20px;
      animation: slideUp 1s cubic-bezier(0.16,1,0.3,1) both;
    }
    .field:nth-child(1) { animation-delay: 0.25s; }
    .field:nth-child(2) { animation-delay: 0.35s; }

    .field label {
      display: block;
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .field input {
      width: 100%;
      padding: 13px 42px 13px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(244,107,30,0.25);
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 300;
      color: var(--white);
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
      caret-color: var(--yellow);
    }

    .field input::placeholder { color: rgba(255,213,168,0.3); }

    .field input:focus {
      border-color: var(--orange);
      background: rgba(244,107,30,0.08);
      box-shadow: 0 0 0 3px rgba(244,107,30,0.12), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .input-icon {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      color: rgba(244,107,30,0.5);
      font-size: 0.85rem;
      pointer-events: none;
    }

    /* ── HELPERS ──────────────────────────────── */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      animation: slideUp 1s 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    .remember {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.73rem; font-weight: 300;
      color: rgba(255,213,168,0.5);
      cursor: pointer; user-select: none;
    }

    .remember input[type="checkbox"] {
      accent-color: var(--orange);
      cursor: pointer;
    }

    .forgot {
      font-size: 0.73rem; font-weight: 400;
      color: var(--yellow);
      text-decoration: none;
      letter-spacing: 0.04em;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    .forgot:hover { opacity: 1; text-decoration: underline; }

    /* ── BUTTON ───────────────────────────────── */
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--red) 0%, var(--orange) 50%, var(--amber) 100%);
      color: var(--white);
      border: none;
      border-radius: 4px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      transition: filter 0.25s, transform 0.2s;
      box-shadow: 0 4px 24px rgba(212,43,43,0.4), 0 2px 8px rgba(244,107,30,0.3);
      animation: slideUp 1s 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }

    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 50%);
    }

    .btn:hover  { filter: brightness(1.12); transform: translateY(-2px); }
    .btn:active { filter: brightness(0.95); transform: translateY(0); }

    /* shimmer sweep */
    .btn::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 3s ease-in-out infinite 2s;
    }

    @keyframes shimmer {
      0%   { left: -60%; }
      100% { left: 160%; }
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      transform: scale(0);
      animation: rippleA 0.65s linear;
      pointer-events: none;
    }
    @keyframes rippleA { to { transform: scale(5); opacity: 0; } }

    /* ── DIVIDER ──────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
      animation: slideUp 1s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px;
      background: rgba(244,107,30,0.2);
    }
    .divider span {
      font-size: 0.68rem; letter-spacing: 0.15em;
      color: rgba(255,213,168,0.35); font-weight: 300;
    }

    /* ── FOOTER ───────────────────────────────── */
    .card-footer {
      text-align: center;
      font-size: 0.75rem; font-weight: 300;
      color: rgba(255,213,168,0.45);
      animation: slideUp 1s 0.55s cubic-bezier(0.16,1,0.3,1) both;
    }
    .card-footer a { color: var(--yellow); text-decoration: none; font-weight: 400; }
    .card-footer a:hover { text-decoration: underline; }

    /* ── TICKER BAND ──────────────────────────── */
    .ticker {
      position: fixed; bottom: 0; left: 0; right: 0;
      z-index: 20;
      height: 32px;
      background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow), var(--orange), var(--red));
      background-size: 400%;
      animation: tickerBg 6s linear infinite;
      overflow: hidden;
      display: flex; align-items: center;
    }

    @keyframes tickerBg {
      0%   { background-position: 0%; }
      100% { background-position: 400%; }
    }

    .ticker-inner {
      display: flex;
      gap: 0;
      animation: tickerScroll 22s linear infinite;
      white-space: nowrap;
    }

    .ticker-item {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(26,10,0,0.85);
      font-weight: 500;
      padding: 0 28px;
    }

    @keyframes tickerScroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── TOP BAR ──────────────────────────────── */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 20;
      height: 3px;
      background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow), var(--orange), var(--red));
      background-size: 300%;
      animation: tickerBg 4s linear infinite;
    }

  </style>
</head>
<body>

<div class="bg"></div>
<div class="glow"></div>
<div class="topbar"></div>
<canvas id="c"></canvas>

<!-- LOGIN CARD -->
<div class="page">
  <div class="card">
    <div class="card-inner-glow"></div>

    <div class="brand">
      <div class="logo-ring">
        <svg width="68" height="68" viewBox="0 0 68 68" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- outer ring petals -->
          <ellipse cx="34" cy="8"  rx="5" ry="9"  fill="#d42b2b" opacity="0.9"/>
          <ellipse cx="34" cy="8"  rx="5" ry="9"  fill="#f46b1e" transform="rotate(45 34 34)"  opacity="0.85"/>
          <ellipse cx="34" cy="8"  rx="5" ry="9"  fill="#f5c518" transform="rotate(90 34 34)"  opacity="0.9"/>
          <ellipse cx="34" cy="8"  rx="5" ry="9"  fill="#f46b1e" transform="rotate(135 34 34)" opacity="0.85"/>
          <ellipse cx="34" cy="8"  rx="5" ry="9"  fill="#d42b2b" transform="rotate(180 34 34)" opacity="0.9"/>
          <ellipse cx="34" cy="8"  rx="5" ry="9"  fill="#f46b1e" transform="rotate(225 34 34)" opacity="0.85"/>
          <ellipse cx="34" cy="8"  rx="5" ry="9"  fill="#f5c518" transform="rotate(270 34 34)" opacity="0.9"/>
          <ellipse cx="34" cy="8"  rx="5" ry="9"  fill="#f46b1e" transform="rotate(315 34 34)" opacity="0.85"/>
          <!-- center -->
          <circle cx="34" cy="34" r="11" fill="#f5c518"/>
          <circle cx="34" cy="34" r="7.5" fill="#e8860a"/>
          <circle cx="34" cy="34" r="4"   fill="#fff9f0"/>
          <!-- dot details -->
          <circle cx="31" cy="31" r="1.2" fill="#e8860a" opacity="0.7"/>
          <circle cx="37" cy="32" r="1"   fill="#e8860a" opacity="0.7"/>
          <circle cx="33" cy="37" r="1.1" fill="#e8860a" opacity="0.7"/>
        </svg>
      </div>
      <h1>Flowery <span>Charms</span></h1>
      <p>Welcome back to your garden</p>
    </div>

    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" placeholder="your@email.com" autocomplete="username">
        <span class="input-icon">✦</span>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" placeholder="••••••••" autocomplete="current-password">
        <span class="input-icon">✦</span>
      </div>
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox"> Keep me signed in
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button class="btn" id="loginBtn">Enter the Garden</button>

    <div class="divider"><span>or</span></div>

    <div class="card-footer">
      New here? <a href="#">Create an account</a>
    </div>
  </div>
</div>

<!-- BOTTOM TICKER -->
<div class="ticker">
  <div class="ticker-inner" id="ticker"></div>
</div>

<script>
// ── BUILD TICKER ─────────────────────────────
const items = ['Fresh Blooms Daily','Bouquets & Arrangements','Same-Day Delivery','Seasonal Collections','Gift Wrapping','Wedding Flowers','Corporate Orders','Flowery Charms ✿'];
const t = document.getElementById('ticker');
// duplicate for seamless loop
[...items, ...items].forEach(txt => {
  const s = document.createElement('span');
  s.className = 'ticker-item';
  s.textContent = txt;
  t.appendChild(s);
});

// ── RIPPLE ───────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', function(e) {
  const r = document.createElement('span');
  r.classList.add('ripple');
  const rect = this.getBoundingClientRect();
  const sz = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  this.appendChild(r);
  setTimeout(() => r.remove(), 700);
});

// ── CANVAS PETALS ────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize(); addEventListener('resize', resize);

// petal palette: orange, red, yellow, white combos
const PALETTES = [
  ['#f46b1e','#d42b2b'],
  ['#f5c518','#f46b1e'],
  ['#ffffff','#f5c518'],
  ['#ffd5a8','#f46b1e'],
  ['#d42b2b','#8b0000'],
  ['#fffde0','#f5c518'],
];

class Petal {
  constructor(init) {
    this.reset(init);
  }
  reset(init) {
    this.x  = Math.random() * innerWidth;
    this.y  = init ? Math.random() * innerHeight * -0.8 : -20;
    this.w  = Math.random() * 9 + 4;
    this.h  = Math.random() * 14 + 7;
    this.vy = Math.random() * 1.1 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.7;
    this.rot   = Math.random() * Math.PI * 2;
    this.rotV  = (Math.random() - 0.5) * 0.04;
    this.swing = Math.random() * 0.6 + 0.1;
    this.swingF= Math.random() * 0.018 + 0.008;
    this.t     = Math.random() * 100;
    this.pal   = PALETTES[Math.floor(Math.random() * PALETTES.length)];
    this.alpha = Math.random() * 0.55 + 0.2;
    this.shape = Math.random() < 0.35 ? 'round' : 'oval';
  }
  update() {
    this.t  += this.swingF;
    this.x  += this.vx + Math.sin(this.t) * this.swing;
    this.y  += this.vy;
    this.rot+= this.rotV;
    if (this.y > innerHeight + 20) this.reset(false);
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha = this.alpha;

    const g = ctx.createRadialGradient(0, -this.h*0.2, 1, 0, 0, this.h);
    g.addColorStop(0, this.pal[0]);
    g.addColorStop(1, this.pal[1]);

    ctx.beginPath();
    if (this.shape === 'round') {
      ctx.ellipse(0, 0, this.w * 0.5, this.h * 0.5, 0, 0, Math.PI*2);
    } else {
      ctx.ellipse(0, 0, this.w * 0.35, this.h * 0.65, 0, 0, Math.PI*2);
    }
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }
}

// more petals for a lush, dense feel
const petals = Array.from({length: 55}, () => new Petal(true));

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  petals.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(loop);
}
loop();

// ── AMBIENT MOUSE PARALLAX ────────────────────
const card = document.querySelector('.card');
document.addEventListener('mousemove', e => {
  const cx = innerWidth  / 2;
  const cy = innerHeight / 2;
  const dx = (e.clientX - cx) / cx;
  const dy = (e.clientY - cy) / cy;
  card.style.transform = `perspective(900px) rotateY(${dx*3}deg) rotateX(${-dy*2}deg)`;
});
document.addEventListener('mouseleave', () => {
  card.style.transform = '';
});
</script>

</body>
</html>
