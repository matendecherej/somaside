<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowery Charms — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">

  <style>
    :root {
      --cream: #fdf6ee;
      --blush: #f2c4b0;
      --rose: #c9606a;
      --deep: #3b1f22;
      --sage: #8aab8a;
      --gold: #c9a84c;
      --mist: rgba(253,246,238,0.6);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
    }

    /* ── BACKGROUND LAYERS ─────────────────────── */
    .bg-gradient {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 15% 10%, #f7dbd5 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 90% 80%, #d4e8c2 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 60% 30%, #fae8d4 0%, transparent 50%),
        var(--cream);
    }

    .noise {
      position: fixed; inset: 0; z-index: 1; opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    /* ── FALLING PETALS ────────────────────────── */
    .petals-canvas {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
    }

    /* ── BOTANICAL CORNERS ─────────────────────── */
    .botanical {
      position: fixed; z-index: 3; pointer-events: none;
      opacity: 0.22;
    }
    .botanical.tl { top: -20px; left: -20px; transform: rotate(0deg); }
    .botanical.br { bottom: -20px; right: -20px; transform: rotate(180deg); }
    .botanical.tr { top: -20px; right: -20px; transform: scaleX(-1); }
    .botanical.bl { bottom: -20px; left: -20px; transform: rotate(180deg) scaleX(-1); }

    /* ── FLOATING BLOSSOMS (background deco) ───── */
    .blossom {
      position: fixed; z-index: 2; pointer-events: none;
      opacity: 0;
      animation: blossomFloat 20s ease-in-out infinite;
    }

    @keyframes blossomFloat {
      0%   { opacity:0; transform: translateY(10px) scale(0.8) rotate(0deg); }
      15%  { opacity: 0.12; }
      85%  { opacity: 0.12; }
      100% { opacity:0; transform: translateY(-30px) scale(1.1) rotate(15deg); }
    }

    /* ── MAIN CARD ─────────────────────────────── */
    .card-wrap {
      position: relative; z-index: 10;
      animation: cardReveal 1.2s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes cardReveal {
      from { opacity:0; transform: translateY(30px) scale(0.96); }
      to   { opacity:1; transform: translateY(0) scale(1); }
    }

    .card {
      width: 380px;
      background: rgba(253,246,238,0.72);
      backdrop-filter: blur(18px) saturate(1.4);
      border: 1px solid rgba(201,96,106,0.18);
      border-radius: 24px;
      padding: 48px 44px 44px;
      box-shadow:
        0 2px 0 rgba(255,255,255,0.9) inset,
        0 32px 64px rgba(59,31,34,0.12),
        0 8px 24px rgba(201,96,106,0.08);
      position: relative;
      overflow: hidden;
    }

    /* delicate line accent top */
    .card::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 0 0 2px 2px;
    }

    /* ── BRAND ─────────────────────────────────── */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-icon {
      display: inline-block;
      margin-bottom: 12px;
      animation: petalSpin 12s linear infinite;
    }

    @keyframes petalSpin {
      to { transform: rotate(360deg); }
    }

    .brand h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--deep);
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .brand h1 em {
      font-style: italic;
      color: var(--rose);
    }

    .brand p {
      margin-top: 6px;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sage);
    }

    /* ── FORM ──────────────────────────────────── */
    .field {
      position: relative;
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 0.65rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 7px;
      transition: color 0.2s;
    }

    .field input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(201,96,106,0.2);
      border-radius: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--deep);
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }

    .field input::placeholder { color: rgba(59,31,34,0.35); }

    .field input:focus {
      border-color: var(--rose);
      background: rgba(255,255,255,0.82);
      box-shadow: 0 0 0 3px rgba(201,96,106,0.1);
    }

    .field-icon {
      position: absolute; right: 14px; bottom: 13px;
      color: rgba(201,96,106,0.45);
      font-size: 1rem;
      pointer-events: none;
    }

    /* ── HELPERS ───────────────────────────────── */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
    }

    .remember {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.75rem; font-weight: 300;
      color: rgba(59,31,34,0.55);
      cursor: pointer;
      user-select: none;
    }

    .remember input[type="checkbox"] { accent-color: var(--rose); cursor: pointer; }

    .forgot {
      font-size: 0.75rem; font-weight: 300;
      color: var(--rose);
      text-decoration: none;
      letter-spacing: 0.04em;
      position: relative;
    }
    .forgot::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: var(--rose);
      transform: scaleX(0);
      transition: transform 0.25s;
      transform-origin: left;
    }
    .forgot:hover::after { transform: scaleX(1); }

    /* ── BUTTON ────────────────────────────────── */
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--rose) 0%, #b84a5a 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(201,96,106,0.35);
    }

    .btn::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(201,96,106,0.45);
    }
    .btn:active { transform: translateY(0); }

    /* ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      transform: scale(0);
      animation: rippleAnim 0.6s linear;
      pointer-events: none;
    }
    @keyframes rippleAnim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── DIVIDER ───────────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: rgba(201,96,106,0.18);
    }
    .divider span {
      font-size: 0.7rem; letter-spacing: 0.15em;
      color: rgba(59,31,34,0.35);
      font-weight: 300;
    }

    /* ── FOOTER ────────────────────────────────── */
    .card-footer {
      text-align: center;
      font-size: 0.75rem;
      font-weight: 300;
      color: rgba(59,31,34,0.5);
    }
    .card-footer a {
      color: var(--rose);
      text-decoration: none;
      font-weight: 400;
    }
    .card-footer a:hover { text-decoration: underline; }

    /* ── PETALS ANIMATION ──────────────────────── */
    .petal-item {
      position: fixed;
      pointer-events: none;
      z-index: 2;
      will-change: transform;
    }

    /* ── STEM DECORATION ───────────────────────── */
    .stems {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 3;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      padding: 0 5%;
    }

  </style>
</head>
<body>

<!-- Background layers -->
<div class="bg-gradient"></div>
<div class="noise"></div>

<!-- Botanical SVG corners -->
<svg class="botanical tl" width="260" height="260" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 250 Q30 180 80 140 Q120 100 160 60 Q200 20 240 10" stroke="#8aab8a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M40 240 Q50 200 100 170 Q140 145 170 110" stroke="#8aab8a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M80 140 Q60 110 50 80 Q42 58 55 40" stroke="#8aab8a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="52" cy="35" rx="14" ry="9" fill="#8aab8a" transform="rotate(-40 52 35)" opacity="0.7"/>
  <ellipse cx="160" cy="60" rx="16" ry="10" fill="#c9606a" transform="rotate(-55 160 60)" opacity="0.5"/>
  <ellipse cx="163" cy="54" rx="7" ry="5" fill="#c9a84c" transform="rotate(-55 163 54)" opacity="0.9"/>
  <circle cx="162" cy="60" r="4" fill="#fdf6ee" opacity="0.9"/>
  <ellipse cx="100" cy="170" rx="12" ry="8" fill="#8aab8a" transform="rotate(-30 100 170)" opacity="0.5"/>
</svg>

<svg class="botanical br" width="260" height="260" viewBox="0 0 260 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M10 250 Q30 180 80 140 Q120 100 160 60 Q200 20 240 10" stroke="#8aab8a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M40 240 Q50 200 100 170 Q140 145 170 110" stroke="#8aab8a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <ellipse cx="160" cy="60" rx="16" ry="10" fill="#c9606a" transform="rotate(-55 160 60)" opacity="0.5"/>
  <ellipse cx="163" cy="54" rx="7" ry="5" fill="#c9a84c" transform="rotate(-55 163 54)" opacity="0.9"/>
  <circle cx="162" cy="60" r="4" fill="#fdf6ee" opacity="0.9"/>
</svg>

<!-- Petal canvas -->
<canvas class="petals-canvas" id="petalsCanvas"></canvas>

<!-- Stem row -->
<div class="stems" id="stems"></div>

<!-- LOGIN CARD -->
<div class="card-wrap">
  <div class="card">

    <div class="brand">
      <div class="brand-icon">
        <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Petals -->
          <ellipse cx="26" cy="13" rx="7" ry="12" fill="#f2c4b0" opacity="0.9"/>
          <ellipse cx="26" cy="13" rx="7" ry="12" fill="#c9606a" transform="rotate(51 26 26)" opacity="0.75"/>
          <ellipse cx="26" cy="13" rx="7" ry="12" fill="#f2c4b0" transform="rotate(102 26 26)" opacity="0.9"/>
          <ellipse cx="26" cy="13" rx="7" ry="12" fill="#c9606a" transform="rotate(153 26 26)" opacity="0.75"/>
          <ellipse cx="26" cy="13" rx="7" ry="12" fill="#f2c4b0" transform="rotate(204 26 26)" opacity="0.9"/>
          <ellipse cx="26" cy="13" rx="7" ry="12" fill="#c9606a" transform="rotate(255 26 26)" opacity="0.75"/>
          <ellipse cx="26" cy="13" rx="7" ry="12" fill="#f2c4b0" transform="rotate(306 26 26)" opacity="0.9"/>
          <!-- Center -->
          <circle cx="26" cy="26" r="9" fill="#c9a84c"/>
          <circle cx="26" cy="26" r="6" fill="#f5d67a"/>
          <circle cx="24" cy="24" r="1.5" fill="#c9a84c" opacity="0.6"/>
          <circle cx="28" cy="25" r="1" fill="#c9a84c" opacity="0.6"/>
          <circle cx="25" cy="28" r="1.2" fill="#c9a84c" opacity="0.6"/>
        </svg>
      </div>
      <h1>Flowery <em>Charms</em></h1>
      <p>Blossom into your account</p>
    </div>

    <div class="field">
      <label>Username</label>
      <input type="text" placeholder="your@email.com" autocomplete="username">
      <span class="field-icon">✦</span>
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="••••••••" autocomplete="current-password">
      <span class="field-icon">✦</span>
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox"> Keep me signed in
      </label>
      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <button class="btn" id="loginBtn">Enter the Garden</button>

    <div class="divider"><span>or</span></div>

    <div class="card-footer">
      New here? <a href="#">Create an account</a>
    </div>

  </div>
</div>

<script>
// ── RIPPLE on button ───────────────────────────
document.getElementById('loginBtn').addEventListener('click', function(e) {
  const btn = this;
  const r = document.createElement('span');
  r.classList.add('ripple');
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size/2) + 'px';
  r.style.top  = (e.clientY - rect.top  - size/2) + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 700);
});

// ── CANVAS PETALS ─────────────────────────────
const canvas = document.getElementById('petalsCanvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const PETAL_COLORS = [
  ['#f2c4b0','#c9606a'],
  ['#fde8e0','#e8889a'],
  ['#fdf0e8','#f2c4b0'],
  ['#e8d5c4','#c9a84c'],
  ['#d4e8c2','#8aab8a'],
];

class Petal {
  constructor() { this.reset(true); }
  reset(init = false) {
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height * -1 : -30;
    this.size = Math.random() * 10 + 5;
    this.speedY = Math.random() * 1.2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.8;
    this.rot    = Math.random() * Math.PI * 2;
    this.rotSpd = (Math.random() - 0.5) * 0.03;
    this.swing  = Math.random() * 0.5;
    this.swingSpd = Math.random() * 0.02 + 0.01;
    this.t      = Math.random() * 100;
    this.color  = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
    this.alpha  = Math.random() * 0.5 + 0.3;
  }
  update() {
    this.t += this.swingSpd;
    this.x += this.speedX + Math.sin(this.t) * this.swing;
    this.y += this.speedY;
    this.rot += this.rotSpd;
    if (this.y > canvas.height + 30) this.reset();
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.ellipse(0, 0, this.size * 0.45, this.size, 0, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(0,-this.size*0.3,1,0,0,this.size);
    grad.addColorStop(0, this.color[0]);
    grad.addColorStop(1, this.color[1]);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();
  }
}

const petals = Array.from({length: 35}, () => new Petal());

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  petals.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(loop);
}
loop();

// ── SVG STEMS ────────────────────────────────
const stemsEl = document.getElementById('stems');
const stemData = [
  { h: 180, petals: 1, color: '#c9606a', leaf: true },
  { h: 130, petals: 0, color: '#8aab8a', leaf: true },
  { h: 220, petals: 1, color: '#e8889a', leaf: false },
  { h: 110, petals: 0, color: '#8aab8a', leaf: true },
  { h: 200, petals: 1, color: '#c9a84c', leaf: true },
  { h: 90,  petals: 0, color: '#8aab8a', leaf: false },
  { h: 160, petals: 1, color: '#c9606a', leaf: true },
];

stemData.forEach((s, i) => {
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width','60');
  svg.setAttribute('height', s.h);
  svg.setAttribute('viewBox',`0 0 60 ${s.h}`);
  svg.style.cssText = `opacity:0.55; flex-shrink:0;`;

  let inner = `<line x1="30" y1="${s.h}" x2="30" y2="0" stroke="#8aab8a" stroke-width="2" stroke-linecap="round"/>`;

  if (s.leaf) {
    const ly = s.h * 0.55;
    inner += `
      <path d="M30 ${ly} Q15 ${ly-20} 10 ${ly-40} Q22 ${ly-15} 30 ${ly}" fill="#8aab8a" opacity="0.7"/>
      <path d="M30 ${ly+15} Q45 ${ly-5} 50 ${ly-25} Q38 ${ly+10} 30 ${ly+15}" fill="#8aab8a" opacity="0.5"/>
    `;
  }

  if (s.petals) {
    const fc = s.color;
    inner += `
      <ellipse cx="30" cy="10" rx="6" ry="10" fill="${fc}" opacity="0.85"/>
      <ellipse cx="30" cy="10" rx="6" ry="10" fill="${fc}" transform="rotate(60 30 10)" opacity="0.75"/>
      <ellipse cx="30" cy="10" rx="6" ry="10" fill="${fc}" transform="rotate(120 30 10)" opacity="0.85"/>
      <ellipse cx="30" cy="10" rx="6" ry="10" fill="${fc}" transform="rotate(180 30 10)" opacity="0.75"/>
      <ellipse cx="30" cy="10" rx="6" ry="10" fill="${fc}" transform="rotate(240 30 10)" opacity="0.85"/>
      <ellipse cx="30" cy="10" rx="6" ry="10" fill="${fc}" transform="rotate(300 30 10)" opacity="0.75"/>
      <circle cx="30" cy="10" r="5" fill="#fdf6ee"/>
      <circle cx="30" cy="10" r="3" fill="#c9a84c"/>
    `;
  }

  svg.innerHTML = inner;
  stemsEl.appendChild(svg);
});
</script>

</body>
</html>
