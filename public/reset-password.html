<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soma Side | Reset Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root { --plum:#1e0130; --purple:#7b2fbe; --violet:#b06aff; --gold:#e8b84b; --white:#ffffff; }
    body { font-family:'DM Sans',sans-serif; background:var(--plum); color:var(--white); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem; }
    body::before { content:""; position:fixed; inset:0; background:radial-gradient(circle at 70% 20%, rgba(123,47,190,0.25), transparent 60%); pointer-events:none; }
    .card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:2.5rem; width:100%; max-width:420px; position:relative; box-shadow:0 30px 60px rgba(0,0,0,0.4); }
    .card::before { content:""; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--purple),var(--violet),var(--gold)); border-radius:24px 24px 0 0; }
    .logo { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:900; color:var(--gold); margin-bottom:0.2rem; }
    .subtitle { font-family:'Syne',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:2rem; }
    h2 { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:700; margin-bottom:0.5rem; }
    .desc { font-size:0.88rem; color:rgba(255,255,255,0.55); line-height:1.7; margin-bottom:1.8rem; }
    .form-group { margin-bottom:1.2rem; }
    label { display:block; font-family:'Syne',sans-serif; font-size:0.72rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:rgba(255,255,255,0.45); margin-bottom:0.45rem; }
    input { width:100%; padding:0.85rem 1rem; border-radius:12px; border:1.5px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:#fff; font-family:'DM Sans',sans-serif; font-size:0.95rem; transition:border-color 0.2s; }
    input:focus { outline:none; border-color:var(--violet); background:rgba(176,106,255,0.07); }
    input::placeholder { color:rgba(255,255,255,0.25); }
    .btn { width:100%; padding:1rem; border-radius:50px; background:var(--gold); color:var(--plum); font-family:'Syne',sans-serif; font-weight:800; font-size:1rem; border:none; margin-top:0.5rem; transition:transform 0.2s, box-shadow 0.2s; }
    .btn:hover { transform:translateY(-2px); box-shadow:0 10px 28px rgba(232,184,75,0.4); }
    .feedback { border-radius:10px; padding:0.75rem 1rem; font-size:0.88rem; margin-bottom:1.2rem; display:none; }
    .feedback.error { display:block; background:rgba(220,60,60,0.12); color:#ff8f8f; border:1px solid rgba(220,60,60,0.25); }
    .feedback.success { display:block; background:rgba(100,220,160,0.1); color:#6adfb0; border:1px solid rgba(100,220,160,0.25); }
    .back-link { display:block; text-align:center; margin-top:1.2rem; font-family:'Syne',sans-serif; font-size:0.8rem; font-weight:700; color:rgba(255,255,255,0.4); transition:color 0.2s; }
    .back-link:hover { color:var(--gold); }
    a { text-decoration:none; }
    *, *::before, *::after { cursor: none !important; }

.cursor {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #e8b84b;
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 999999;
  transform: translate(-50%, -50%);
  transition: width 0.2s, height 0.2s, background 0.2s;
}
.cursor.expand { width: 40px; height: 40px; background: #b06aff; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Soma Side</div>
    <div class="subtitle">African Literature</div>

    <!-- FORGOT PASSWORD FORM -->
    <div id="forgotSection">
      <h2>Forgot password?</h2>
      <p class="desc">Enter your email and we'll send you a link to reset your password.</p>
      <div class="feedback" id="forgotFeedback"></div>
      <div class="form-group">
        <label for="forgotEmail">Email</label>
        <input type="email" id="forgotEmail" placeholder="your@email.com">
      </div>
      <button class="btn" id="forgotBtn" onclick="handleForgot()">Send reset link →</button>
      <a href="home.html" class="back-link">← Back to stories</a>
    </div>

    <!-- RESET PASSWORD FORM (shown when token is in URL) -->
    <div id="resetSection" style="display:none;">
      <h2>New password</h2>
      <p class="desc">Choose a strong password — at least 6 characters.</p>
      <div class="feedback" id="resetFeedback"></div>
      <div class="form-group">
        <label for="newPassword">New password</label>
        <input type="password" id="newPassword" placeholder="Min. 6 characters">
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password">
      </div>
      <button class="btn" id="resetBtn" onclick="handleReset()">Reset password ✦</button>
    </div>
  </div>

  <script>
    // Check if there's a reset token in the URL
    const params = new URLSearchParams(window.location.search)
    const token  = params.get('token')

    if (token) {
      document.getElementById('forgotSection').style.display = 'none'
      document.getElementById('resetSection').style.display  = 'block'
    }

    // ── Forgot password ───────────────────────────────────────
    async function handleForgot() {
      const email = document.getElementById('forgotEmail').value.trim()
      const btn   = document.getElementById('forgotBtn')
      const fb    = document.getElementById('forgotFeedback')

      if (!email) return showFeedback(fb, 'Please enter your email.', 'error')

      btn.disabled    = true
      btn.textContent = 'Sending…'

      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email })
        })
        const data = await res.json()
        showFeedback(fb, data.message || 'Reset link sent!', 'success')
        btn.textContent = 'Sent ✓'
      } catch (err) {
        showFeedback(fb, 'Something went wrong. Try again.', 'error')
        btn.disabled    = false
        btn.textContent = 'Send reset link →'
      }
    }

    // ── Reset password ────────────────────────────────────────
    async function handleReset() {
      const password = document.getElementById('newPassword').value
      const confirm  = document.getElementById('confirmPassword').value
      const btn      = document.getElementById('resetBtn')
      const fb       = document.getElementById('resetFeedback')

      if (!password || !confirm) return showFeedback(fb, 'Please fill in both fields.', 'error')
      if (password !== confirm)  return showFeedback(fb, 'Passwords do not match.', 'error')
      if (password.length < 6)   return showFeedback(fb, 'Password must be at least 6 characters.', 'error')

      btn.disabled    = true
      btn.textContent = 'Resetting…'

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ token, password })
        })
        const data = await res.json()

        if (!res.ok) {
          showFeedback(fb, data.error, 'error')
          btn.disabled    = false
          btn.textContent = 'Reset password ✦'
          return
        }

        showFeedback(fb, 'Password reset! Redirecting to login…', 'success')
        setTimeout(() => { window.location.href = 'home.html' }, 2000)

      } catch (err) {
        showFeedback(fb, 'Something went wrong. Try again.', 'error')
        btn.disabled    = false
        btn.textContent = 'Reset password ✦'
      }
    }

    function showFeedback(el, msg, type) {
      el.textContent = msg
      el.className   = `feedback ${type}`
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return
      if (token) handleReset()
      else handleForgot()
    })
  </script>
  <div class="cursor" id="cursor"></div>

<script>
  const cursor = document.getElementById('cursor')
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px'
    cursor.style.top  = e.clientY + 'px'
  })
  document.querySelectorAll('a, button, input').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('expand'))
    el.addEventListener('mouseleave', () => cursor.classList.remove('expand'))
  })
</script>
</body>
</html>
