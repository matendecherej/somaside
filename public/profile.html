<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soma Side | Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" href="assets/logo.PNG" type="image/png">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; cursor:none !important; }
    html { scroll-behavior:smooth; }
    :root {
      --plum:#1e0130; --plum-mid:#2e0a3f; --plum-lt:#3d1260; --purple:#7b2fbe; --violet:#b06aff;
      --gold:#e8b84b; --white:#ffffff; --muted:rgba(255,255,255,0.55); --muted-lt:rgba(255,255,255,0.32);
      --radius:20px; --radius-lg:28px;
    }
    body { font-family:'DM Sans',sans-serif; background:var(--plum); color:var(--white); overflow-x:hidden; min-height:100vh; }
    a { text-decoration:none; color:inherit; }

    /* ── Cursor ── */
    .cursor { width:14px; height:14px; border-radius:50%; background:var(--gold); position:fixed; top:0; left:0; pointer-events:none; z-index:999999; transform:translate(-50%,-50%); transition:width 0.2s, height 0.2s, background 0.2s; mix-blend-mode:difference; }
    .cursor.expand { width:40px; height:40px; background:var(--violet); }

    /* noise */
    body::before { content:""; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E"); opacity:0.03; pointer-events:none; z-index:0; }

    /* ── Navbar ── */
    .navbar { display:flex; justify-content:space-between; align-items:center; background:rgba(30,1,48,0.88); backdrop-filter:blur(18px); padding:0 2.5rem; height:65px; position:sticky; top:0; z-index:1000; border-bottom:1px solid rgba(255,255,255,0.06); }
    .navbar .logo img { height:40px; width:auto; object-fit:contain; }
    .nav-links { display:flex; align-items:center; gap:2rem; list-style:none; }
    .nav-links a { color:rgba(255,255,255,0.65); font-family:'Syne',sans-serif; font-weight:600; font-size:0.88rem; letter-spacing:0.05em; padding:0.4rem 0; position:relative; transition:color 0.2s; }
    .nav-links a::after { content:""; position:absolute; bottom:-2px; left:0; width:0; height:2px; background:var(--gold); transition:width 0.3s ease; }
    .nav-links a:hover, .nav-links a.active { color:var(--gold); }
    .nav-links a:hover::after, .nav-links a.active::after { width:100%; }
    .menu-toggle { display:none; font-size:1.5rem; color:#fff; background:none; border:none; }

    /* ══════════════════════════════════════
       HERO — full bleed, atmospheric
    ══════════════════════════════════════ */
    .profile-hero {
      min-height: 420px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 80px; /* space for avatar overlap */
      background: linear-gradient(160deg, #0d0018 0%, #2e0a3f 50%, #1a0030 100%);
    }

    /* grid lines */
    .profile-hero::before {
      content: "";
      position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 48px, rgba(123,47,190,0.06) 48px, rgba(123,47,190,0.06) 49px),
        repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(232,184,75,0.03) 48px, rgba(232,184,75,0.03) 49px);
      z-index: 0;
    }

    /* warm orbs */
    .hero-orb { position:absolute; border-radius:50%; filter:blur(80px); pointer-events:none; z-index:0; }
    .hero-orb-1 { width:500px; height:500px; background:radial-gradient(circle,rgba(123,47,190,0.5),transparent 70%); top:-160px; right:-80px; }
    .hero-orb-2 { width:320px; height:320px; background:radial-gradient(circle,rgba(232,184,75,0.15),transparent 70%); bottom:-40px; left:5%; }
    .hero-orb-3 { width:200px; height:200px; background:radial-gradient(circle,rgba(176,106,255,0.25),transparent 70%); top:30%; left:40%; }

    /* kente stripe at very bottom of hero */
    .hero-stripe {
      position: absolute; bottom: 0; left: 0; right: 0; height: 4px; z-index: 2;
      background: repeating-linear-gradient(90deg,
        var(--gold) 0, var(--gold) 20px,
        transparent 20px, transparent 40px,
        var(--violet) 40px, var(--violet) 60px,
        transparent 60px, transparent 80px,
        rgba(123,47,190,0.6) 80px, rgba(123,47,190,0.6) 100px,
        transparent 100px, transparent 120px
      );
      opacity: 0.7;
    }

    /* Hero text content */
    .hero-content {
      position: relative; z-index: 2;
      text-align: center;
      padding: 0 2rem;
      animation: fadeUp 0.6s ease both;
    }

    .hero-eyebrow {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); opacity: 0.8;
      margin-bottom: 1rem;
      display: flex; align-items: center; justify-content: center; gap: 0.6rem;
    }
    .hero-eyebrow::before, .hero-eyebrow::after {
      content: ""; display: block; width: 28px; height: 1px; background: rgba(232,184,75,0.4);
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      font-weight: 900; line-height: 1.05;
      color: var(--white); margin-bottom: 0.6rem;
      letter-spacing: -0.02em;
    }

    .hero-handle {
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      color: var(--violet); letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    .hero-bio {
      max-width: 480px; margin: 0 auto 1.4rem;
      font-size: 0.95rem; line-height: 1.8;
      color: var(--muted); font-weight: 300;
    }

    .hero-joined {
      font-family: 'Syne', sans-serif;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted-lt);
    }

    /* ── Avatar — sits below hero, overlapping ── */
    .avatar-anchor {
      display: flex;
      justify-content: center;
      margin-top: -56px;
      position: relative; z-index: 10;
      animation: fadeUp 0.5s ease both;
    }
    /* Transparent ring — a soft outline instead of a solid gradient border */
    .avatar-ring {
      width: 112px; height: 112px;
      border-radius: 50%; padding: 3px;
      background: transparent;
      border: 2px solid rgba(255,255,255,0.16);
      box-shadow: 0 16px 48px rgba(0,0,0,0.55);
      transition: border-color 0.25s, transform 0.2s;
    }
    .avatar-ring:hover {
      border-color: rgba(232,184,75,0.55);
      transform: scale(1.03);
    }
    .avatar-inner {
      width: 100%; height: 100%; border-radius: 50%;
      background: linear-gradient(145deg,#3d1260,#7b2fbe);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.6rem; overflow: hidden;
      border: 3px solid var(--plum);
    }
    .avatar-inner img { width:100%; height:100%; object-fit:cover; }

    /* ══════════════════════════════════════
       STATS ROW — warm horizontal strip
    ══════════════════════════════════════ */
    .stats-strip {
      display: flex;
      justify-content: center;
      gap: 0;
      max-width: 560px;
      margin: 1.8rem auto 0;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .stat-item {
      flex: 1;
      padding: 1.2rem 0.6rem;
      text-align: center;
      border-right: 1px solid rgba(255,255,255,0.07);
      transition: background 0.2s;
    }
    .stat-item:last-child { border-right: none; }
    .stat-item:hover { background: rgba(123,47,190,0.1); }
    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; font-weight: 900;
      color: var(--gold); line-height: 1;
      display: block;
    }
    .stat-label {
      font-family: 'Syne', sans-serif;
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.09em; text-transform: uppercase;
      color: var(--muted-lt); margin-top: 0.3rem;
      display: block;
    }

    /* ── Action buttons ── */
    .profile-actions {
      display: flex; justify-content: center; gap: 0.8rem; flex-wrap: wrap;
      margin-top: 1.4rem;
      animation: fadeUp 0.5s 0.15s ease both;
    }
    .edit-btn {
      padding: 0.55rem 1.4rem; border-radius: 50px;
      border: 1.5px solid rgba(232,184,75,0.4);
      background: transparent; color: var(--gold);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.04em; transition: background 0.2s, color 0.2s;
    }
    .edit-btn:hover { background: var(--gold); color: var(--plum); }
    .logout-btn {
      padding: 0.55rem 1.4rem; border-radius: 50px;
      border: 1.5px solid rgba(255,107,138,0.25);
      background: transparent; color: rgba(255,143,143,0.8);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .logout-btn:hover { background: rgba(255,107,138,0.1); color: #ff8f8f; border-color: rgba(255,107,138,0.4); }

    /* Follow — filled gold by default, ghost once following */
    .follow-btn {
      padding: 0.55rem 1.5rem; border-radius: 50px; border: none;
      background: var(--gold); color: var(--plum);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
      letter-spacing: 0.04em; transition: transform 0.2s, background 0.2s, color 0.2s, border-color 0.2s;
      display: none;
    }
    .follow-btn:hover { transform: translateY(-2px); }
    .follow-btn:disabled { opacity: 0.6; transform: none; }
    .follow-btn.following {
      background: transparent; color: var(--white);
      border: 1.5px solid rgba(255,255,255,0.25);
    }
    .follow-btn.following:hover { background: rgba(255,107,138,0.1); color: #ff8f8f; border-color: rgba(255,107,138,0.35); }

    /* Share — violet ghost, matches your existing genre accent palette */
    .share-btn-profile {
      padding: 0.55rem 1.4rem; border-radius: 50px;
      border: 1.5px solid rgba(176,106,255,0.35);
      background: transparent; color: var(--violet);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.8rem;
      transition: background 0.2s, color 0.2s;
    }
    .share-btn-profile:hover { background: rgba(176,106,255,0.1); }

    /* ══════════════════════════════════════
       NOTICE BOARD
    ══════════════════════════════════════ */
    .notice-board { max-width: 820px; margin: 2.6rem auto 0; padding: 0 2rem; animation: fadeUp 0.5s 0.18s ease both; }
    .notice-board-inner {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg);
      padding: 1.6rem 1.8rem;
      position: relative;
      overflow: hidden;
    }
    .notice-board-inner::before {
      content: ""; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--violet));
    }
    .notice-board-header { display: flex; align-items: baseline; gap: 0.7rem; flex-wrap: wrap; margin-bottom: 1.2rem; }
    .notice-board-header h3 { font-family: 'Playfair Display', serif; font-size: 1.15rem; font-weight: 700; color: var(--white); }
    .notice-board-sub { font-size: 0.78rem; color: var(--muted-lt); font-family: 'Syne', sans-serif; }

    .notice-composer { margin-bottom: 1.4rem; }
    .notice-composer textarea {
      width: 100%; min-height: 70px; resize: vertical;
      background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 14px; padding: 0.8rem 1rem; color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 0.9rem; line-height: 1.6; outline: none;
      transition: border-color 0.2s;
    }
    .notice-composer textarea:focus { border-color: rgba(176,106,255,0.5); }
    .notice-composer-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 0.6rem; }
    .notice-char-count { font-size: 0.72rem; color: var(--muted-lt); font-family: 'Syne', sans-serif; }
    .notice-post-btn {
      padding: 0.5rem 1.3rem; border-radius: 50px; border: none;
      background: var(--gold); color: var(--plum);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem;
      transition: opacity 0.2s;
    }
    .notice-post-btn:disabled { opacity: 0.45; }

    .notice-list { display: flex; flex-direction: column; gap: 0.9rem; }
    .notice-item {
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      padding: 0.9rem 1.1rem;
      position: relative;
    }
    .notice-item p { font-size: 0.88rem; line-height: 1.65; color: rgba(255,255,255,0.85); white-space: pre-wrap; padding-right: 1.6rem; }
    .notice-item .notice-time { display: block; margin-top: 0.5rem; font-size: 0.68rem; color: var(--muted-lt); font-family: 'Syne', sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }
    .notice-delete {
      position: absolute; top: 0.6rem; right: 0.6rem;
      background: rgba(220,60,60,0.1); border: 1px solid rgba(220,60,60,0.25);
      color: #ff8f8f; border-radius: 50%; width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center; font-size: 0.7rem;
      transition: background 0.2s;
    }
    .notice-delete:hover { background: rgba(220,60,60,0.25); }
    .notice-empty { text-align: center; padding: 2rem 1rem; color: var(--muted-lt); font-size: 0.85rem; }

    /* ══════════════════════════════════════
       CONTENT AREA
    ══════════════════════════════════════ */
    .profile-content {
      max-width: 820px;
      margin: 3rem auto 6rem;
      padding: 0 2rem;
      animation: fadeUp 0.5s 0.2s ease both;
    }

    /* ── Tabs ── */
    .tab-nav {
      display: flex; gap: 0.3rem; margin-bottom: 2rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px; padding: 0.3rem;
      width: fit-content;
    }
    .tab-btn {
      padding: 0.5rem 1.5rem; border-radius: 50px; border: none;
      background: transparent; color: var(--muted);
      font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem;
      letter-spacing: 0.04em; transition: background 0.2s, color 0.2s;
    }
    .tab-btn:hover { color: var(--white); }
    .tab-btn.active { background: var(--gold); color: var(--plum); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Story cards — horizontal, matching home.html style ── */
    .profile-story-list { display: flex; flex-direction: column; gap: 1rem; }

    .profile-story-card {
      display: grid;
      grid-template-columns: 110px 1fr;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
      position: relative;
      cursor: pointer;
    }
    .profile-story-card::before {
      content: ""; position: absolute;
      left: 0; top: 0; bottom: 0; width: 3px;
      background: linear-gradient(180deg, var(--purple), var(--violet));
      opacity: 0; transition: opacity 0.3s;
    }
    .profile-story-card:hover { transform: translateX(5px); box-shadow: 0 10px 36px rgba(0,0,0,0.4); border-color: rgba(176,106,255,0.22); }
    .profile-story-card:hover::before { opacity: 1; }

    .psc-cover {
      height: auto; min-height: 110px;
      background-size: cover; background-position: center;
      position: relative; flex-shrink: 0;
    }
    .psc-body { padding: 1.1rem 1.3rem; display: flex; flex-direction: column; justify-content: center; gap: 0.25rem; }
    .psc-body h4 { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--white); line-height: 1.3; }
    .psc-meta { font-size: 0.75rem; color: var(--muted-lt); }
    .psc-excerpt { font-size: 0.82rem; color: var(--muted); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-top: 0.2rem; }
    .psc-footer { display: flex; align-items: center; gap: 0.8rem; margin-top: 0.5rem; }
    .psc-likes { font-size: 0.75rem; color: var(--muted-lt); font-family: 'Syne', sans-serif; }
    .psc-read { margin-left: auto; font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; }

    /* tags */
    .tag { display:inline-block; padding:0.18rem 0.65rem; border-radius:50px; font-family:'Syne',sans-serif; font-size:0.63rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
    .tag.poem  { background:rgba(176,106,255,0.2); color:#c8a0ff; }
    .tag.story { background:rgba(100,150,255,0.15); color:#8ab4ff; }
    .tag.song  { background:rgba(100,220,160,0.15); color:#6adfb0; }
    .tag-thriller  { background:rgba(255,80,80,.14);   color:#ff9999; }
.tag-mystery   { background:rgba(150,100,255,.14);  color:#c8a0ff; }
.tag-scifi     { background:rgba(0,200,255,.14);    color:#80e8ff; }
.tag-drama     { background:rgba(255,160,80,.14);   color:#ffc080; }
.tag-satire    { background:rgba(200,255,100,.14);  color:#c8ff80; }
.tag-children  { background:rgba(255,220,0,.14);    color:#ffe566; }

    /* ── Empty state ── */
    .empty-state { text-align:center; padding:4rem 2rem; color:var(--muted); }
    .empty-icon { font-size:2.6rem; margin-bottom:1rem; opacity:0.4; }
    .empty-state p { margin-bottom:1.2rem; font-size:0.9rem; line-height:1.7; }
    .empty-state a { display:inline-flex; align-items:center; gap:0.4rem; color:var(--gold); font-family:'Syne',sans-serif; font-weight:700; font-size:0.82rem; border:1.5px solid rgba(232,184,75,0.4); padding:0.5rem 1.3rem; border-radius:50px; transition:background 0.2s, color 0.2s; }
    .empty-state a:hover { background:var(--gold); color:var(--plum); }

    /* ── Ink particles ── */
    #inkCanvas {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Animation ── */
    @keyframes fadeUp { from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);} }

    /* ── Responsive ── */
    @media(max-width:600px) {
      .profile-hero { min-height: 360px; padding-bottom: 70px; }
      .hero-name { font-size: 2.2rem; }
      .stats-strip { margin: 1.4rem 1.2rem 0; }
      .profile-content { margin-top: 2rem; }
      .profile-story-card { grid-template-columns: 90px 1fr; }
      .psc-cover { min-height: 90px; }
      .navbar { padding: 0 1.2rem; }
      .nav-links { display:none; flex-direction:column; position:absolute; top:65px; left:0; right:0; background:#1e0130; padding:1rem 1.5rem; gap:0.5rem; border-bottom:1px solid rgba(255,255,255,0.06); z-index:999; }
      .nav-links.active { display:flex; }
      .menu-toggle { display:block; }
      .notice-board { padding: 0 1.2rem; }
      .notice-board-inner { padding: 1.3rem 1.2rem; }
    }
  </style>
</head>
<body data-page="profile">

  <div class="cursor" id="cursor"></div>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="logo"><a href="index.html"><img src="assets/logo.PNG" alt="Soma Side"></a></div>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="home.html">Stories</a></li>
      <li><a href="upload.html">Write</a></li>
      <li><a href="profile.html" class="active">Profile</a></li>
    </ul>
    <button class="menu-toggle" id="menuToggle">☰</button>
  </header>

  <!-- HERO -->
  <section class="profile-hero">
    <div class="hero-orb hero-orb-1"></div>
    <div class="hero-orb hero-orb-2"></div>
    <div class="hero-orb hero-orb-3"></div>
    <canvas id="inkCanvas"></canvas>
    <div class="hero-content">
      <p class="hero-eyebrow">Writer</p>
      <h1 class="hero-name" id="profileName">—</h1>
      <p class="hero-handle" id="profileHandle">—</p>
      <p class="hero-bio" id="profileBio">—</p>
      <p class="hero-joined" id="profileJoined">—</p>
    </div>
    <div class="hero-stripe"></div>
  </section>

  <!-- AVATAR (overlaps hero bottom) — whole thing is clickable -->
  <div class="avatar-anchor">
    <div class="avatar-ring" id="avatarRing" style="position:relative;">
      <div class="avatar-inner" id="avatarEl">🌍</div>
      <button id="avatarUploadBtn" title="Change profile picture" style="
        position:absolute; bottom:-2px; right:-2px;
        width:34px; height:34px; border-radius:50%;
        background:var(--gold); border:3px solid var(--plum);
        display:flex; align-items:center; justify-content:center;
        font-size:0.95rem; transition:transform 0.2s; z-index:5;
      ">📷</button>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      // ── Cursor ──
      const cursor = document.getElementById('cursor')
      document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px'
        cursor.style.top  = e.clientY + 'px'
      })
      document.addEventListener('mouseover', e => {
        if (e.target.closest('a,button,.profile-story-card,.stat-item')) cursor.classList.add('expand')
        else cursor.classList.remove('expand')
      })

      // ── Mobile menu ──
      document.getElementById('menuToggle').addEventListener('click', () => {
        document.getElementById('navLinks').classList.toggle('active')
      })

      // ── Tabs ──
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
          document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
          btn.classList.add('active')
          document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active')
        })
      })

      // ── Logout ──
      document.getElementById('logoutBtn').addEventListener('click', () => {
        clearSession()
        window.location.href = 'index.html'
      })

      // ── Ink particles ──
      const canvas  = document.getElementById('inkCanvas')
      const ctx     = canvas.getContext('2d')

      function resize() {
        canvas.width  = canvas.offsetWidth
        canvas.height = canvas.offsetHeight
      }
      resize()
      window.addEventListener('resize', resize)

      const COLORS = [
        'rgba(176,106,255,',   // violet
        'rgba(232,184,75,',    // gold
        'rgba(123,47,190,',    // purple
        'rgba(255,255,255,',   // white
      ]

      class Particle {
        constructor() { this.reset(true) }

        reset(initial = false) {
          this.x     = Math.random() * canvas.width
          this.y     = initial ? Math.random() * canvas.height : canvas.height + 20
          this.r     = 1.5 + Math.random() * 3.5
          this.color = COLORS[Math.floor(Math.random() * COLORS.length)]
          this.alpha = 0.06 + Math.random() * 0.14
          this.vx    = (Math.random() - 0.5) * 0.35
          this.vy    = -(0.18 + Math.random() * 0.32)
          this.wobble     = Math.random() * Math.PI * 2
          this.wobbleSpeed = 0.008 + Math.random() * 0.012
          this.life  = 0
          this.maxLife = 280 + Math.random() * 220
        }

        update() {
          this.wobble += this.wobbleSpeed
          this.x     += this.vx + Math.sin(this.wobble) * 0.4
          this.y     += this.vy
          this.life  ++
          if (this.life < 40)       this.a = (this.life / 40) * this.alpha
          else if (this.life > this.maxLife - 60) this.a = ((this.maxLife - this.life) / 60) * this.alpha
          else                      this.a = this.alpha
          if (this.life >= this.maxLife) this.reset()
        }

        draw() {
          ctx.beginPath()
          ctx.ellipse(this.x, this.y, this.r, this.r * 1.35, this.wobble, 0, Math.PI * 2)
          ctx.fillStyle = this.color + this.a + ')'
          ctx.fill()
        }
      }

      const particles = Array.from({ length: 55 }, () => new Particle())

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height)
        particles.forEach(p => { p.update(); p.draw() })
        requestAnimationFrame(animate)
      }
      animate()

      // ── Init profile (own or public — decided inside profile.js) ──
      initProfile()
    })
  </script>
