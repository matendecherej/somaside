<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soma Side | Stories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
   *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
    html { scroll-behavior: smooth; }

    :root {
      --plum:     #1e0130;
      --plum-mid: #2e0a3f;
      --purple:   #7b2fbe;
      --violet:   #b06aff;
      --gold:     #e8b84b;
      --white:    #ffffff;
      --muted:    rgba(255,255,255,0.6);
      --radius:   20px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--plum);
      color: var(--white);
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }
    /* ── Cursor ── */
.cursor {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--gold);
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 999999 !important;
  transform: translate(-50%, -50%);
  transition: transform 0.12s ease, width 0.2s, height 0.2s, background 0.2s;
  mix-blend-mode: difference;
}
.cursor.expand {
  width: 40px;
  height: 40px;
  background: var(--violet);
}

    /* ===================== SPLASH SCREEN ===================== */
    #splash {
      position: fixed; inset: 0; z-index: 999999 !important;
      background: #0d0018;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem;
      pointer-events: all;
      transition: opacity 0.7s ease, visibility 0.7s ease;
    }
    #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-glow { position: absolute; width: 520px; height: 520px; border-radius: 50%; background: radial-gradient(circle, rgba(123,47,190,0.35) 0%, rgba(176,106,255,0.1) 45%, transparent 70%); animation: glowPulse 2.8s ease-in-out infinite; pointer-events: none; }
    @keyframes glowPulse { 0%, 100% { transform: scale(0.92); opacity: 0.7; } 50% { transform: scale(1.08); opacity: 1; } }
    .splash-ring { position: absolute; width: 260px; height: 260px; border-radius: 50%; border: 1.5px solid rgba(232,184,75,0.18); animation: ringPulse 2.8s ease-in-out infinite; }
    .splash-ring.ring2 { width: 320px; height: 320px; border-color: rgba(176,106,255,0.12); animation-delay: 0.4s; }
    .splash-ring.ring3 { width: 390px; height: 390px; border-color: rgba(123,47,190,0.08); animation-delay: 0.8s; }
    @keyframes ringPulse { 0%, 100% { transform: scale(0.94); opacity: 0.5; } 50% { transform: scale(1.06); opacity: 1; } }
    .splash-logo-wrap { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; animation: logoPulse 2.8s ease-in-out infinite; }
    @keyframes logoPulse { 0% { transform: scale(0.72); opacity: 0; } 18% { transform: scale(1.04); opacity: 1; } 30% { transform: scale(0.97); } 42% { transform: scale(1.02); } 55% { transform: scale(1); } 75% { transform: scale(1.03); } 100% { transform: scale(1); } }
    .splash-logo-wrap img { width: 180px; height: auto; filter: drop-shadow(0 0 28px rgba(176,106,255,0.55)) drop-shadow(0 0 60px rgba(123,47,190,0.3)); }
    .splash-brand { position: relative; z-index: 2; font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.32em; text-transform: uppercase; color: rgba(232,184,75,0.75); animation: fadeSlideUp 0.9s 0.6s both ease-out; }
    @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .splash-dots { position: relative; z-index: 2; display: flex; gap: 0.5rem; animation: fadeSlideUp 0.9s 1s both ease-out; }
    .splash-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: dotBounce 1.2s ease-in-out infinite; }
    .splash-dots span:nth-child(2) { animation-delay: 0.18s; background: var(--violet); }
    .splash-dots span:nth-child(3) { animation-delay: 0.36s; background: rgba(255,255,255,0.4); }
    @keyframes dotBounce { 0%, 80%, 100% { transform: scale(1); opacity: 0.5; } 40% { transform: scale(1.6); opacity: 1; } }
    #splash::after { content: ""; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E"); pointer-events: none; opacity: 0.4; }

    /* ===================== NAVBAR ===================== */
    .navbar { display: flex; justify-content: space-between; align-items: center; background: rgba(30,1,48,0.85); backdrop-filter: blur(18px); padding: 0 2.5rem; height: 65px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255,255,255,0.06); box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .navbar .logo img { height: 40px; width: auto; max-width: 160px; object-fit: contain; }
    .nav-links { display: flex; align-items: center; gap: 2rem; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.75); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 0.9rem; letter-spacing: 0.05em; padding: 0.5rem 0; position: relative; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-links a::after { content: ""; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: var(--gold); transition: width 0.3s ease; }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .menu-toggle { display: none; font-size: 1.6rem; color: #fff; cursor: pointer; background: none; border: none; }

    /* ===================== HERO STRIP ===================== */
    .feed-hero { background: var(--plum); padding: 5rem 2rem 3.5rem; text-align: center; position: relative; overflow: hidden; }
    .feed-hero::before { content: ""; position: absolute; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(123,47,190,0.25), transparent 70%); top: -200px; right: -150px; pointer-events: none; }
    .feed-hero::after { content: ""; position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(123,47,190,0.04) 40px, rgba(123,47,190,0.04) 41px), repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(232,184,75,0.03) 40px, rgba(232,184,75,0.03) 41px); pointer-events: none; }
    .feed-hero-tag { display: inline-flex; align-items: center; gap: 0.5rem; font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.2rem; padding: 0.35rem 1rem; border: 1px solid rgba(232,184,75,0.3); border-radius: 50px; position: relative; z-index: 1; }
    .feed-hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 5vw, 3.5rem); font-weight: 900; line-height: 1.15; position: relative; z-index: 1; }
    .feed-hero h1 em { font-style: italic; color: var(--violet); }
    .feed-hero p { margin: 0.9rem auto 0; max-width: 480px; color: var(--muted); font-size: 1rem; line-height: 1.75; position: relative; z-index: 1; }

    .gold-divider { height: 3px; background: repeating-linear-gradient(90deg, var(--gold) 0, var(--gold) 18px, transparent 18px, transparent 36px); opacity: 0.45; }

    /* ===================== FILTERS ===================== */
    .filter-bar { background: rgba(46,10,63,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); padding: 1rem 2rem; position: sticky; top: 65px; z-index: 50; display: flex; justify-content: center; gap: 0.6rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.45rem 1.2rem; border-radius: 50px; border: 1.5px solid rgba(255,255,255,0.12); background: transparent; color: rgba(255,255,255,0.6); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem; letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { border-color: var(--violet); color: var(--violet); }
    .filter-btn.active { background: var(--gold); color: var(--plum); border-color: var(--gold); }

    /* ===================== SEARCH BAR ===================== */
    .search-bar-wrap {
      background: var(--plum);
      padding: 1.5rem 2rem 0;
      display: flex;
      justify-content: center;
    }
    .search-bar {
      width: 100%;
      max-width: 480px;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      background: rgba(255,255,255,0.045);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 50px;
      padding: 0.7rem 1.2rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-bar:focus-within {
      border-color: rgba(176,106,255,0.55);
      background: rgba(176,106,255,0.06);
    }
    .search-icon {
      width: 17px; height: 17px; flex-shrink: 0;
      color: rgba(255,255,255,0.4);
      transition: color 0.2s;
    }
    .search-bar:focus-within .search-icon { color: var(--gold); }
    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      cursor: text !important;
    }
    .search-bar input::placeholder { color: rgba(255,255,255,0.32); }
    #searchClearBtn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 22px; height: 22px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.6);
      flex-shrink: 0;
      transition: background 0.2s, color 0.2s;
    }
    #searchClearBtn.visible { display: flex; }
    #searchClearBtn:hover { background: rgba(255,90,90,0.2); color: #ff9090; }
    #searchClearBtn svg { width: 12px; height: 12px; }
    .search-no-results {
      text-align: center;
      color: rgba(255,255,255,0.4);
      grid-column: 1 / -1;
      padding: 3rem 1rem;
      font-family: 'Syne', sans-serif;
    }

    /* ===================== GRID ===================== */
    .feed-container { max-width: 1100px; margin: 0 auto; padding: 3rem 2rem 5rem; }
   
#storyGrid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 1.2rem;
}

/* ===================== STORY CARD (minimal) ===================== */
.story-card {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 3 / 4;
  border: 1px solid rgba(255,255,255,0.07);
  cursor: pointer;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 0.5s ease, transform 0.4s ease, border-color 0.3s, box-shadow 0.3s;
}
.story-card.visible { opacity: 1; transform: translateY(0); }
.story-card:hover {
  transform: translateY(-6px);
  border-color: rgba(176,106,255,0.3);
  box-shadow: 0 16px 40px rgba(0,0,0,0.4);
}

.card-cover-only {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
}
.card-cover-only::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(14,0,22,0.85) 0%, rgba(14,0,22,0.1) 55%, rgba(14,0,22,0) 75%);
}

.genre-badge-overlay {
  position: absolute;
  top: 0.7rem;
  left: 0.7rem;
  z-index: 2;
  padding: 0.2rem 0.7rem;
  border-radius: 50px;
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
/* reuse your existing genre color set */
.genre-badge-overlay.poem  { background: rgba(176,106,255,0.85); color: #fff; }
.genre-badge-overlay.story { background: rgba(100,150,255,0.85); color: #fff; }
.genre-badge-overlay.song  { background: rgba(100,220,160,0.85); color: #10231a; }
.genre-badge-overlay.thriller { background: rgba(255,80,80,0.85);  color: #fff; }
.genre-badge-overlay.mystery  { background: rgba(150,100,255,0.85); color: #fff; }
.genre-badge-overlay.scifi    { background: rgba(0,200,255,0.85);   color: #06222b; }
.genre-badge-overlay.drama    { background: rgba(255,160,80,0.85);  color: #2b1400; }
.genre-badge-overlay.satire   { background: rgba(200,255,100,0.85); color: #1c2900; }
.genre-badge-overlay.children { background: rgba(255,220,0,0.85);   color: #2b2400; }

.rating-badge-overlay {
  position: absolute;
  bottom: 0.7rem;
  left: 0.7rem;
  z-index: 2;
  padding: 0.2rem 0.65rem;
  border-radius: 6px;
  font-family: 'Syne', sans-serif;
  font-size: 0.65rem;
  font-weight: 800;
  letter-spacing: 0.05em;
}
/* stays inside your plum/gold/violet/purple palette — no new colors */
.rating-badge-overlay.rating-g,
.rating-badge-overlay.rating-pg    { background: rgba(255,255,255,0.14); color: var(--white); }
.rating-badge-overlay.rating-pg13  { background: var(--gold); color: var(--plum); }
.rating-badge-overlay.rating-16    { background: var(--purple); color: var(--white); }
.rating-badge-overlay.rating-18    { background: var(--violet); color: var(--plum); }

@media (max-width: 600px) {
  #storyGrid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.8rem; }
}

    @media (max-width: 600px) {
      .navbar { padding: 0 1.2rem; }
      .nav-links { flex-direction: column; max-height: 0; overflow: hidden; width: 100%; position: absolute; top: 65px; left: 0; background: #1e0130; padding: 0 1.5rem; transition: max-height 0.3s ease, padding 0.3s ease; gap: 0; }
      .nav-links.active { max-height: 400px; padding: 1rem 1.5rem; }
      .nav-links li { padding: 0.5rem 0; }
      .menu-toggle { display: block; }
      .splash-logo-wrap img { width: 130px; }
      .splash-glow { width: 340px; height: 340px; }
      .search-bar-wrap { padding: 1.2rem 1.2rem 0; }
    }
  </style>
</head>
<body data-page="home">

  <!-- SPLASH SCREEN — unchanged -->
  <div id="splash">
    <div class="splash-glow"></div>
    <div class="splash-ring"></div>
    <div class="splash-ring ring2"></div>
    <div class="splash-ring ring3"></div>
    <div class="splash-logo-wrap">
      <img src="assets/logo.png" alt="Soma Side"
           onerror="this.style.display='none'; document.getElementById('splash-text-logo').style.display='flex';" />
      <div id="splash-text-logo" style="display:none; flex-direction:column; align-items:center; gap:0.2rem;">
        <span style="font-family:'Playfair Display',serif; font-size:3.5rem; font-weight:900; color:#fff; letter-spacing:-0.02em; line-height:1;">Soma</span>
        <div style="width:100%; height:2px; background: linear-gradient(90deg, transparent, #e8b84b, transparent);"></div>
        <span style="font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; color:#b06aff; letter-spacing:0.12em;">SIDE</span>
      </div>
    </div>
    <div class="splash-brand">African Literature</div>
    <div class="splash-dots"><span></span><span></span><span></span></div>
  </div>

  <!-- NAVBAR -->
<header class="navbar">
  <div class="logo"><a href="index.html"><img src="assets/logo.png" alt="Soma Side"></a></div>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="home.html" class="active">Stories</a></li>
    <li><a href="upload.html">Write</a></li>
    <li id="navAuthItem">
      <button onclick="showAuthModal('register')"
        style="background:var(--gold);color:var(--plum);padding:0.4rem 1.1rem;border-radius:50px;
               border:none;font-family:'Syne',sans-serif;font-weight:700;font-size:0.88rem;">
        Join Free
      </button>
    </li>
  </ul>
  <button class="menu-toggle" id="menuToggle">☰</button>
</header>

  <section class="feed-hero">
    <div class="feed-hero-tag">✦ African Literature</div>
    <h1>Stories that <em>feel like home</em></h1>
    <p>Poems, folktales, and songs from across Africa — written by the people who live them.</p>
  </section>

  <div class="gold-divider"></div>
  <div class="filter-bar" id="genreFilters"></div>

  <div class="search-bar-wrap">
    <div class="search-bar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by title or author…" autocomplete="off">
      <button type="button" id="searchClearBtn" aria-label="Clear search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
  </div>

  <main class="feed-container">
    <div id="storyGrid"></div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth-modal.js"></script>
  <script src="js/home.js"></script>
  <script src="js/main.js"></script>

  <div class="cursor" id="cursor"></div>

  <script>
    /* ── Cursor ── */
    const cursor = document.getElementById('cursor');
    document.addEventListener('mousemove', e => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top  = e.clientY + 'px';
    });
    document.querySelectorAll('a, button, .story-card').forEach(el => {
      el.addEventListener('mouseenter', () => cursor.classList.add('expand'));
      el.addEventListener('mouseleave', () => cursor.classList.remove('expand'));
    });

    /* ── Splash Screen ── */
   window.addEventListener('load', () => {
  const minDisplay = 2600;
  const startTime  = performance.now();
  function dismissSplash() {
    const elapsed = performance.now() - startTime;
    const delay   = Math.max(0, minDisplay - elapsed);
    setTimeout(() => {
      const splash = document.getElementById('splash');
      splash.classList.add('hidden');
      splash.style.pointerEvents = 'none'; // ← add this: stop blocking clicks immediately
      splash.addEventListener('transitionend', () => splash.remove(), { once: true });
    }, delay);
  }
  dismissSplash();
});


    document.addEventListener('DOMContentLoaded', () => {
  // Nav auth state
  try {
    const user = getUser()
    if (user) {
      document.getElementById('navAuthItem').innerHTML =
        `<a href="profile.html" style="color:var(--gold);font-family:'Syne',sans-serif;font-weight:700;font-size:0.85rem;letter-spacing:.05em;text-transform:uppercase;text-decoration:none;">
          👤 ${user.name.split(' ')[0]}
        </a>`
    }
  } catch(e) {}

  // Init home feed
  initHome()
})
    
  </script>
</body>
</html>
